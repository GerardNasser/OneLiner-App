name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: pytest -q

  release:
    # Build the .app and attach it to the GitHub release when a v* tag is pushed
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest  # Apple Silicon runner -> arm64 build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install customtkinter pyinstaller
      - run: pyinstaller One-Liner.spec --clean --noconfirm
      # Ad-hoc signature: doesn't remove the Gatekeeper warning, but prevents
      # the "app is damaged" error on newer macOS
      - run: codesign --force --deep -s - dist/One-Liner.app
      - env:
          TAG: ${{ github.ref_name }}
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent One-Liner.app "One-Liner-${TAG}-arm64.zip"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/One-Liner-*.zip
          generate_release_notes: true
